name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Testes Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Atualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar projeto em modo desenvolvimento
        run: python -m pip install -e ".[dev]"

      - name: Executar testes
        run: pytest

      - name: Validar links Markdown locais
        run: python -m vercosa_ai_framework.cli.main docs-links

      - name: Validar compilação Python
        run: python -m compileall src
