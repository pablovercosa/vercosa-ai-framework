name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Testes Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Atualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar projeto em modo desenvolvimento
        run: python -m pip install -e ".[dev]"

      - name: Executar testes
        run: pytest

      - name: Validar links Markdown locais
        run: python -m vercosa_ai_framework.cli.main docs-links

      - name: Diagnosticar prontidão alfa local
        shell: bash
        run: |
          status=0
          python -m vercosa_ai_framework.cli.main alpha-readiness || status=$?

          case "$status" in
            0)
              echo "Diagnóstico concluído sem bloqueios."
              ;;
            1)
              echo "Diagnóstico concluído: projeto ainda não está pronto para alfa."
              ;;
            *)
              echo "Erro inesperado no diagnóstico de prontidão alfa: código $status."
              exit "$status"
              ;;
          esac

      - name: Validar compilação Python
        run: python -m compileall src
